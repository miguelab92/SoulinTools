name: BuildAndPublish

on:
  push:
    branches: [main]
    tags: ['*']

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build SoulinTools.csproj --configuration Release

      - name: Pack
        run: dotnet pack SoulinTools.csproj --configuration Release --no-build --output artifacts

      - name: NuGet Authenticate (OIDC)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: 'miguelab92' 
                
      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --source https://nuget.org